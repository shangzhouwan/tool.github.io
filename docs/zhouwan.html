
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>雪鹏所做的演示的周湾部分族谱</title>
  <link rel="icon" href="https://static.figma.com/app/icon/1/favicon.ico">
  <script src="https://unpkg.com/d3@6"></script>
  <script type="module" src="https://unpkg.com/family-chart@0.2.1"></script>
  <link rel="stylesheet" href="./css/family-tree.css">
</head>
<body>
  <div id="FamilyChart" class="f3" style="width:100%;height:900px;margin:auto;background-color:rgb(33,33,33);color:#fff;"></div>
  <script type="module">
    window['myfamily'] =[{"id":"0","rels":{"spouses":[],"children":[],"mother":"725f6e39-c840-4864-a8da-4bfc095ecada","father":"0f44eb44-4fc2-4eda-b481-058911b7d879"},"data":{"姓名":"史廷玉","生卒年月":"生卒年月不详","avatar":"","gender":"M","性别":"M"},"main":true}];
      create(data())

    function create(data) {
      const f3Chart = f3.createChart('#FamilyChart', data)
        .setTransitionTime(1000)
        .setCardXSpacing(250)
        .setCardYSpacing(150)
        .setOrientationVertical()
        .setSingleParentEmptyCard(true, {label: '添加'})
    
      const f3Card = f3Chart.setCard(f3.CardHtml)
        .setCardDisplay([["姓名"],["生卒年月"]])
        .setCardDim({})
        .setMiniTree(true)
        .setStyle('imageCircle')
        .setOnHoverPathToMain()
    
      
      const f3EditTree = f3Chart.editTree()
        .fixed(true)
        .setFields(["姓名","生卒年月","avatar"])
        .setEditFirst(true)
      
      f3EditTree.setEdit()
      
      f3Card.setOnCardClick((e, d) => {
        f3EditTree.open(d)
        if (f3EditTree.isAddingRelative()) return
        f3Card.onCardClickDefault(e, d)
      })
    
      f3Chart.updateTree({initial: true})
      f3EditTree.open(f3Chart.getMainDatum())
    
      f3Chart.updateTree({initial: true})
    }
    
    function data() {
      return window['myfamily'];
    }

    const newDiv = document.createElement('div');
    newDiv.textContent = "这是雪鹏所做的演示的孙中山部分族谱";
    
    newDiv.style.position = 'absolute';
    newDiv.style.left = '50%';
    newDiv.style.top = '50px';
    newDiv.style.transform = 'translate(-50%, -50%)';
   
    const parentDiv = document.getElementById('FamilyChart');
    parentDiv.style.position = 'relative'; 
    parentDiv.style.height = '100vh'; 
    
    parentDiv.appendChild(newDiv);
  </script>
</body>
</html>
