    function create(data) {
      const f3Chart = f3.createChart('#FamilyChart', data)
        .setTransitionTime(1000)
        .setCardXSpacing(250)
        .setCardYSpacing(150)
        .setOrientationVertical()
        .setSingleParentEmptyCard(true, {label: '添加'})
    
      const f3Card = f3Chart.setCard(f3.CardHtml)
        .setCardDisplay([["姓名"],["生卒年月"]])
        .setCardDim({})
        .setMiniTree(true)
        .setStyle('imageCircle')
        .setOnHoverPathToMain()
    
      
      const f3EditTree = f3Chart.editTree()
        .fixed(true)
        .setFields(["姓名","生卒年月","avatar"])
        .setEditFirst(true)
      
      f3EditTree.setEdit()
      
      f3Card.setOnCardClick((e, d) => {
        f3EditTree.open(d)
        if (f3EditTree.isAddingRelative()) return
        f3Card.onCardClickDefault(e, d)
      })
    
      f3Chart.updateTree({initial: true})
      f3EditTree.open(f3Chart.getMainDatum())
    
      f3Chart.updateTree({initial: true})
    }
    
    function data() {
      return window['myfamily'];
    }

    const newDiv = document.createElement('div');
    newDiv.textContent = "这是雪鹏所做的演示的周湾部分族谱";
    
    newDiv.style.position = 'absolute';
    newDiv.style.left = '50%';
    newDiv.style.top = '50px';
    newDiv.style.transform = 'translate(-50%, -50%)';
   
    const parentDiv = document.getElementById('FamilyChart');
    parentDiv.style.position = 'relative'; 
    parentDiv.style.height = '100vh'; 
    
    parentDiv.appendChild(newDiv);
  </script>
